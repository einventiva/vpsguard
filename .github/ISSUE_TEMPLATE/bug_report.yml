name: Bug Report / Reporte de Bug
description: Report a bug or unexpected behavior / Reportar un bug o comportamiento inesperado
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description / Descripcion
      description: A clear description of the bug / Descripcion clara del bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / Pasos para reproducir
      description: |
        1. Go to...
        2. Click on...
        3. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / Comportamiento esperado
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable / Si aplica
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend (Dashboard)
        - Backend (Server)
        - Docker
        - WebSocket
        - Setup Wizard
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / Navegador
      placeholder: "Chrome 120, Firefox 121, Safari 17..."
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v18.x, v20.x..."
