name: Feature Request / Solicitud de Feature
description: Suggest a new feature or improvement / Sugerir un feature o mejora
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Problema
      description: What problem does this solve? / Que problema resuelve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution / Solucion propuesta
      description: Describe your ideal solution / Describe tu solucion ideal
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered / Alternativas consideradas
      description: Other approaches you've thought about / Otros enfoques que hayas considerado
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend (Dashboard)
        - Backend (Server)
        - Docker
        - WebSocket
        - Setup Wizard
        - New Integration
        - Other
    validations:
      required: true
